<!DOCTYPE html><html lang="en"> <head><meta charset="UTF-8"><title>Hashiverse</title><meta name="robots" content="noindex"><script>(function(){const supported_locales = ["de","en","es","fr","nl","pt"];

      (function () {
        const langs = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || "en"]);
        let target = "en";
        for (const raw of langs) {
          const code = (raw || "").slice(0, 2).toLowerCase();
          if (supported_locales.includes(code)) { target = code; break; }
        }
        window.location.replace("/" + target + "/");
      })();
    })();</script><noscript><meta http-equiv="refresh" content="0; url=/en/"></noscript></head> <body></body></html>
